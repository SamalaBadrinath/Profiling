<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Registration - Profiling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: #818cf8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Ambient background glows */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
    }

    body::before {
      background: #4f46e5;
      top: 10%;
      left: 15%;
    }

    body::after {
      background: #06b6d4;
      bottom: 10%;
      right: 15%;
    }

    .island-register-card {
      width: 100%;
      max-width: 520px;
      padding: 2.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      animation: islandFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes islandFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .island-register-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .island-register-header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .island-register-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .island-register-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .island-register-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .island-register-group label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .island-register-input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .island-register-input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
      background: rgba(15, 23, 42, 0.8);
    }

    .island-register-file-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border: 1px dashed var(--input-border);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .island-register-file-input::file-selector-button {
      background: var(--accent-color);
      border: none;
      border-radius: 8px;
      color: white;
      padding: 0.375rem 1rem;
      margin-right: 1rem;
      cursor: pointer;
      font-weight: 500;
      font-size: 0.875rem;
      transition: background 0.2s;
    }

    .island-register-file-input::file-selector-button:hover {
      background: var(--accent-hover);
    }

    .island-register-file-input:hover {
      border-color: var(--accent-color);
    }

    .island-register-btn {
      width: 100%;
      padding: 1rem;
      background: var(--accent-color);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      margin-top: 1rem;
    }

    .island-register-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }

    .island-register-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="island-register-card">
    <div class="island-register-header">
      <h1>Create Account</h1>
      <p>Register as a candidate and upload your resume</p>
    </div>

    <form class="island-register-form" action="#" method="POST" enctype="multipart/form-data">
      <div class="island-register-group">
        <label for="name">Candidate Name</label>
        <input type="text" id="name" name="name" class="island-register-input" placeholder="e.g. Jane Doe" required>
      </div>

      <div class="island-register-group">
        <label for="email">Email ID</label>
        <input type="email" id="email" name="email" class="island-register-input" placeholder="e.g. jane.doe@example.com" required>
      </div>

      <div class="island-register-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone" class="island-register-input" placeholder="e.g. +1234567890" required>
      </div>

      <div class="island-register-group">
        <label for="resume">Resume (PDF only)</label>
        <input type="file" id="resume" name="resume" class="island-register-file-input" accept=".pdf" required>
      </div>

      <div class="island-register-group">
        <label for="category">Category</label>
        <input type="text" id="category" name="category" class="island-register-input" placeholder="e.g. Software Engineer" required>
      </div>

      <div class="island-register-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" class="island-register-input" placeholder="••••••••" required>
      </div>

      <div class="island-register-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="island-register-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="island-register-btn">Register</button>
    </form>
  </div>

</body>
</html>
