<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Dashboard - Profiling</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-color: #6366f1;
      --accent-hover: #4f46e5;
      --input-bg: rgba(15, 23, 42, 0.6);
      --input-border: rgba(255, 255, 255, 0.1);
      --input-focus: #818cf8;
      --danger-color: #f43f5e;
      --danger-hover: #e11d48;
      --danger-bg: rgba(244, 63, 94, 0.08);
      --danger-border: rgba(244, 63, 94, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-primary);
      overflow-x: hidden;
      position: relative;
      padding: 2rem 1rem;
    }

    /* Ambient background glows */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      opacity: 0.35;
    }

    body::before {
      background: #4f46e5;
      top: 10%;
      left: 10%;
    }

    body::after {
      background: #06b6d4;
      bottom: 10%;
      right: 10%;
    }

    .island-dashboard-card {
      width: 100%;
      max-width: 600px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      animation: islandFadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes islandFadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .island-dashboard-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 1.25rem;
    }

    .island-dashboard-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .island-logout-btn {
      padding: 0.5rem 1.25rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .island-logout-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .island-profile-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .island-info-group {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .island-info-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 500;
    }

    .island-info-value {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-primary);
      word-break: break-all;
    }

    .island-info-link {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
    }

    .island-info-link:hover {
      color: var(--input-focus);
    }

    .island-edit-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent-color);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-start;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .island-edit-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .island-reset-section {
      border-top: 1px solid var(--card-border);
      padding-top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .island-reset-section h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .island-reset-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: flex-end;
    }

    .island-reset-input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .island-reset-input-group label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      font-weight: 500;
    }

    .island-reset-input {
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .island-reset-input:focus {
      outline: none;
      border-color: var(--input-focus);
      background: rgba(15, 23, 42, 0.8);
    }

    .island-reset-btn {
      grid-column: span 2;
      padding: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .island-reset-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .island-danger-block {
      border: 1px solid var(--danger-border);
      background: var(--danger-bg);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
    }

    .island-danger-text h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--danger-color);
      margin-bottom: 0.25rem;
    }

    .island-danger-text p {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .island-delete-btn {
      padding: 0.65rem 1.25rem;
      background: var(--danger-color);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .island-delete-btn:hover {
      background: var(--danger-hover);
    }
  </style>
</head>
<body>

  <div class="island-dashboard-card">
    <div class="island-dashboard-header">
      <h1>Candidate Workspace</h1>
      <button class="island-logout-btn">Logout</button>
    </div>

    <div class="island-profile-info">
      <div class="island-info-group">
        <span class="island-info-label">Name</span>
        <span class="island-info-value" id="profile-name">[Jane Doe]</span>
      </div>

      <div class="island-info-group">
        <span class="island-info-label">Email</span>
        <span class="island-info-value" id="profile-email">[jane.doe@example.com]</span>
      </div>

      <div class="island-info-group">
        <span class="island-info-label">Phone Number</span>
        <span class="island-info-value" id="profile-phone">[+1234567890]</span>
      </div>

      <div class="island-info-group">
        <span class="island-info-label">Resume File</span>
        <div class="island-info-value">
          <a href="#" class="island-info-link" id="profile-resume-link">[View Resume PDF]</a>
        </div>
      </div>
    </div>

    <button class="island-edit-btn">Edit Details</button>

    <div class="island-reset-section">
      <h2>Reset Password</h2>
      <form class="island-reset-form" action="#" method="POST">
        <div class="island-reset-input-group">
          <label for="old-password">Old Password</label>
          <input type="password" id="old-password" name="oldPassword" class="island-reset-input" required>
        </div>
        <div class="island-reset-input-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" name="newPassword" class="island-reset-input" required>
        </div>
        <button type="submit" class="island-reset-btn">Update Password</button>
      </form>
    </div>

    <div class="island-danger-block">
      <div class="island-danger-text">
        <h3>Danger Zone</h3>
        <p>This action is irreversible. All data will be deleted.</p>
      </div>
      <button class="island-delete-btn">Delete Account</button>
    </div>
  </div>

<script src="/js/candidate.js"></script>
</body>
</html>
